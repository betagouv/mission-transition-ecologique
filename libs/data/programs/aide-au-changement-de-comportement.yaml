      Bourgogne-Franche-Comté, Bretagne, Centre-Val de Loire, Corse, Grand Est,
      Guadeloupe, Guyane, Hauts-de-France, Île-de-France, La Réunion,
      Martinique, Mayotte, Normandie, Nouvelle-Aquitaine, Nouvelle-Calédonie,
      Occitanie, Pays de la Loire, Polynésie française, Provence-Alpes-Côte
      d'Azur, Saint-Barthélemy, Saint-Martin, Saint-Pierre-Et-Miquelon
  secteur d'activité:
    - Tous secteurs d’activité
  nombre d'années d'activité:
    - Éligible à toutes les entreprises
