titre: Aide au changement de comportement
promesse: >-
  Contribuez à faire évoluer les mentalités et les comportements en faveur de la
  transition écologique
description: "Bénéficiez d'un financement pour des projets de sensibilisation, d’animation ou de communication\_d’envergure et structurants pour le territoire,\_en faveur de la transition écologique. \n\nIl peut s'agir, par exemple, de : \n\n- **Formation/sensibilisation**\_: analyse des besoins, conception de modules de formation, animation de sessions.\n- **Communication**\_: réalisation d’outils, diffusion d’informations, création de sites internet, organisation d’événements.\n- **Animation**\_: mobilisation d’une cible, dissémination de solutions, structuration d’une filière, financement de postes relais."
description longue: >-
  Opérations non éligibles : \

  • Financement de personnel titulaire de la fonction publique de l'État, des
  collectivités territoriales et hospitalières.\

  • Financement de personnel dans les communes et EPCI à fiscalité propre.\

  • Actions portées par les entreprises pour leur compte.\

  • Actions déjà démarrées.\

  • Financement de certains profils (Conseillers en Énergie Partagés,
  conseillers France Rénov).
début de validité: 01/01/2026
fin de validité: 31/12/2026
illustration: images/TEE_energie_verte.webp
opérateur de contact: ADEME
contact question: https://agirpourlatransition.ademe.fr/form/contact?id_dsp=DSP000866
url: >-
  https://agirpourlatransition.ademe.fr/entreprises/aides-financieres/catalogue/2026/aides-au-changement-de-comportement
nature de l'aide: financement
montant du financement: Jusqu'à 50% des dépenses éligibles
objectifs:
  - description: >-
      Consultez la documentation de l’ADEME pour vérifier l’éligibilité de votre
      projet ou contactez un conseiller.
    liens:
      - lien: >-
          https://agirpourlatransition.ademe.fr/sites/default/files/Aides%20au%20changement%20de%20comportement%20-%20Conditions%20d%27%C3%A9ligibilit%C3%A9%20et%20de%20financement%20-%202026%20.pdf
        texte: Conditions éligibilité et financement
  - description: Créez un compte ADEME pour pouvoir déposer votre dossier.
    liens:
      - lien: https://agirpourlatransition.ademe.fr/inscription
        texte: Créer mon compte ADEME
  - description: >-
      Déposez votre dossier : informations administratives, description du
      projet, détails techniques et financiers, etc. À ce stade, votre projet ne
      doit pas avoir commencé !
    liens:
      - lien: >-
          https://agirpourlatransition.ademe.fr/entreprises/aides-financieres/catalogue/2026/aides-au-changement-de-comportement
        texte: Déposer mon dossier
  - description: >-
      L'ADEME étudie votre demande d'aide. Si votre demande est acceptée,
      recevez un contrat de financement précisant le montant d’aide maximum, les
      conditions et les modalités de versement.
