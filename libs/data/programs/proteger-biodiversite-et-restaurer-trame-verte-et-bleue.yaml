titre: Restaurer les flux animaux dans les cours d'eau
promesse: >-
  Protégez la biodiversité en favorisant la restauration de la trame verte et
  bleue
description: >-
  Bénéficiez d'une aide financière pour accompagner vos projets ayant pour but
  de **protéger la biodiversité aquatique** et de **restaurer les trames verte
  et bleue**, **qui relient les milieux naturels et les cours d’eau.** \

  Ce dispositif finance, par exemple :


  - Des actions pour **préserver les espèces vivant dans les milieux
  aquatiques**, comme les poissons migrateurs, et d’autres espèces prioritaires.

  - La mise en place des équipements sur les seuils et barrages pour a**ssurer
  la continuité écologique** (circulation piscicole, transit sédimentaire et
  continuité hydrologique).
description longue: >-
  L’atteinte des objectifs des projets sera évaluée à l’aide d’indicateurs de
  résultats adaptés au cas par cas, selon le type d’opération accompagnée et
  définis en concertation avec l’Agence. Ils pourraient porter par exemple sur
  le ou les :


  - Linéaires de ripisylve gérés et restaurés surfaces de zones d’expansion de
  crue renaturées.

  - Nombre d’ouvrages équipés ou effacés.

  - Surfaces de zones humides inventoriées ou gérées.

  - Linéaires de haies plantées ou gérées, etc.
illustration: images/TEE_energie_verte.webp
opérateur de contact: Agence de l'Eau
autres opérateurs:
  - Agence de l'Eau Adour-Garonne
contact question: https://eau-grandsudouest.com/contact
url: >-
  https://eau-grandsudouest.com/aides-financieres/restauration-gestion-milieux-aquatiques-habitats-ecosystemes
nature de l'aide: financement
montant du financement: ''
objectifs:
  - description: Consultez la documentation pour vérifier l'éligibilité de votre projet.
    liens:
      - lien: >-
          https://eau-grandsudouest.com/sites/default/files/2025-11/fiche-thematique_milieux-aquatiques_hd_bureau.pdf
        texte: Conditions éligibilité et financement
  - description: Créez un compte sur l'appli Rivage pour déposer votre demande d'aide.
    liens:
      - lien: https://rivage.eau-adour-garonne.fr/appli/
        texte: Appli Rivages
  - description: >-
      Connectez-vous et sélectionnez la thématique "Préservation et restauration
      des milieux naturels et de la biodiversité" et sélectionnez l'un des
      dispositifs Rivage correspondant à votre projet.
  - description: >-
      Déposez votre dossier : informations administratives, description du
      projet, détails techniques et financiers, etc. À ce stade, votre projet ne
      doit pas avoir commencé !
  - description: >-
      Si votre demande est acceptée, recevez un contrat de financement précisant
      le montant d’aide maximum, les conditions et les modalités de versement.
