titre: Programme EcoproDDuire
promesse: Faites-vous accompagner à la mise en place d'une démarche d'éco-conception
description: >-
  Le programme **Ecoprodduire,** porté par la CCI Pays de la Loire, accompagne
  les entreprises dans l’intégration de l’écoconception au cœur de leur
  stratégie.


  Ce programme, mêlant formation, accompagnement individuel et dynamique
  collective, permet :


  - L'analyse de l’**impact environnemental** d’un produit sur l’ensemble de son
  cycle de vie.

  - L'identification des **leviers concrets de réduction** de l'impact.

  - La **valorisation des actions engagées** à l'aide de la communication
  environnementale.
début de validité: 01/01/2020
fin de validité: 31/12/2027
illustration: images/TEE_energie_verte.webp
opérateur de contact: Chambre de Commerce et de l'Industrie
