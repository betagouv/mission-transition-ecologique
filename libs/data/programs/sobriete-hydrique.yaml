titre: Sobriété hydrique des entreprises
promesse: Investissez dans la réduction de vos consommations et prélèvements d'eau
description: >-
  Bénéficiez de subventions pour vous aider à engager des actions (études,
  investissements, campagnes de sensibilisation, recherche et développement,
  innovation...) d’économie d’eau, telles que :


  - Études de **diagnostics de vos consommations**.

  - Identification des **actions pertinentes**.

  - **Réduction des fuites**.

  - Mise en œuvre de **technologies économes en eau**.

  - Récupération d'**eau pluviale**.
description longue: >-
  - Les opérations d’économies d’eau doivent se traduire par une diminution
  effective des prélèvements dans le milieu au point de prélèvement ou sur le
  réseau d’eau potable.

  - Pour les travaux, les aides sont conditionnées à l’existence de dispositifs
  de comptage des prélèvements ou à la présentation simultanée d’une demande
  d’aide pour l’installation d’un tel dispositif, permettant de démontrer à
  terme l’atteinte de l’objectif d’économie annoncé.

  - Les actions d’économie d’eau inférieures à 2 000 m³/an sont aidées
  uniquement dans le cadre de démarches collectives de branche ou de filière,
  via un appel à projets.

  - Les projets R&D doivent être en lien avec des industriels situés sur les
  bassins Rhône Méditerranée et Corse.
début de validité: 01/01/2025
fin de validité: 31/12/2030
illustration: images/TEE_energie_verte.webp
opérateur de contact: Agence de l'Eau Rhône-Méditerranée-Corse
