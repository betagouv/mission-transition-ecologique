titre: Cibler les micropolluants
promesse: >-
  Mettez en place des mesures préventives ou curatives pour lutter contre les
  micropolluants
description: >-
  Bénéficiez d'un soutien financier afin de **réduire l’apport de
  micropolluants** (plastiques, substances dangereuses, biocides, PFAS, métaux
  lourds, etc.) vers les milieux aquatiques et **protéger la ressource en eau
  potable**.


  Ce dispositif soutient notamment les actions visant :


  - L'amélioration de la **connaissance des milieux**, des techniques d’analyses
  et de traitement.

  - La mise en place ou l’expérimentation d’**actions préventives** à l’échelle
  territoriale pour les différents secteurs émetteurs : industrie et artisanat,
  assainissement, agriculture, établissements de santé, grand public.

  - La mise en place ou l’expérimentation de **mesures curatives.**
illustration: images/TEE_ampoule.webp
opérateur de contact: Agence de l'Eau
autres opérateurs:
  - Agence de l'Eau Adour-Garonne
contact question: https://eau-grandsudouest.com/contact
url: https://eau-grandsudouest.com/aides-financieres/lutte-contre-micropolluants
nature de l'aide: financement
montant du financement: 30 à 80% de l'étude ou de l'investissement, selon projet
objectifs:
  - description: Consultez la documentation pour vérifier l'éligibilité de votre projet.
    liens:
      - lien: >-
          https://eau-grandsudouest.com/sites/default/files/2025-11/fiche-thematique_micropolluants_hd_bureau.pdf
        texte: Conditions éligibilité et financement
  - description: Créez un compte sur l'appli Rivage pour déposer votre demande d'aide.
    liens:
      - lien: https://rivage.eau-adour-garonne.fr/appli/
        texte: Appli Rivages
  - description: >-
      Connectez-vous et sélectionnez l'un des dispositifs Rivage correspondant à
      votre projet.
  - description: >-
      Déposez votre dossier : informations administratives, description du
      projet, détails techniques et financiers, etc. À ce stade, votre projet ne
      doit pas avoir commencé !
  - description: >-
      Si votre demande est acceptée, recevez un contrat de financement précisant
      le montant d’aide maximum, les conditions et les modalités de versement.
