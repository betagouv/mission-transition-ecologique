titre: Amélioration de la qualité de l’air
promesse: >-
  Bénéficiez d'un financement pour vos projets visant à améliorer la qualité de
  l'air
description: "Votre entreprise est implantée dans une zone couverte par un **Plan de Protection de l’Atmosphère (PPA)** ou un territoire où les seuils de pollution de l’air (NO₂, particules, ozone) sont dépassés ou qui le seront dans les prévisions à l'horizon\_2030?\n\nL’ADEME peut vous aider à financer :\n\n- des **études** en vue d’un projet opérationnel,\n\n- des **actions de sensibilisation** au changement de pratiques,\n\n- certains **investissements** (mobilité moins polluante, logistique, organisation des chantiers, raccordement électrique à quai).\n\nL’objectif est de **réduire durablement les émissions de polluants atmosphériques** dans les zones les plus exposées, en soutenant des démarches concrètes, adaptées à votre activité et à votre territoire."
description longue: "Les actions soutenues par l’ADEME viseront une réduction de NO₂, de particules\_PM10, PM2.5 ou d’O₃, mais ils pourront aussi concerner d’autres polluants réglementés – COVNM (composés organiques volatils non méthaniques) ou HAP (Hydrocarbure aromatique polycyclique).\n\nLes projets ciblés sont\_:\n\n- Ceux qui s'insèrent dans un programme d’actions structuré visant à améliorer la qualité de l’air sur le territoire (ex.\_: programmation pluriannuelle, reproductibilité, objectifs clairement définis, anticipation de la directive européenne\_2030 sur la qualité de l’air...). Les gains attendus sur la qualité de l’air (NO₂, particules, O₃ ou autres polluants) seront clairement définis au regard de la situation du territoire.\n\n- Ceux qui concernent la combustion de la biomasse, l’urbanisme et les aménagements, les mobilités des entreprises et la logistique."
début de validité: 01/01/2026
fin de validité: 31/12/2026
illustration: images/TEE_ampoule.webp
opérateur de contact: ADEME
