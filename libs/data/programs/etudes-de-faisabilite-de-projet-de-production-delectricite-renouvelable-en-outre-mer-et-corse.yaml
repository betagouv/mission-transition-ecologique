titre: Étude sur la production d'électricité renouvelable en Outre-mer et Corse
promesse: >-
  Financez une étude pour vérifier la faisabilité d'un projet de production
  d'électricité verte
description: >-
  Recevez un financement de l'ADEME pour une étude qui établit la **faisabilité
  d'un projet de production d'électricité** (technique, économique, sociale,
  environnementale, juridique, etc.) à partir des technologies vertes suivantes
  :


  - Photovoltaïque en autoconsommation individuelle et collective.

  - Éolien terrestre et en mer.

  - Hydrolien fluvial et marin.

  - Petite hydroélectricité au fil de l’eau et microhydroélectricité sur
  conduite d’eau.

  - Énergie houlomotrice.

  - Énergie thermique des mers.

  - Énergie osmotique.

  - Station de transfert d’énergie par pompage.
description longue: >-
  Le prestataire réalisant l'étude de faisabilité doit être externe au
  bénéficiaire de l'étude et doit s'engager à n'exercer aucune activité
  incompatible avec son indépendance de jugement et son intégrité. Il n'est pas
  impliqué directement et n'a pas d'intérêts particuliers: vente, fabrication,
  installation, utilisation ou maintenance des objets sur lesquels porte
  l'étude.
début de validité: 01/01/2026
fin de validité: 31/12/2026
illustration: images/TEE_ampoule.webp
opérateur de contact: ADEME
contact question: https://agirpourlatransition.ademe.fr/form/contact?id_dsp=DSP000876
url: >-
  https://agirpourlatransition.ademe.fr/entreprises/aides-financieres/catalogue/2026/etudes-de-faisabilite-de-projet-de-production-delectricite-renouvelable-en-outre-mer-et-corse
nature de l'aide: étude
montant du financement: Jusqu'à 80% du coût de l'étude, dans la limite de 50 000 €
