titre: CEC Impact
promesse: Inscrivez votre stratégie d'entreprise dans les limites planétaires
description: >-
  Engagez-vous dans un parcours CEC et dessinez la feuille de route de la
  transition écologique de votre entreprise à l'horizon 2030. \

  Faire un parcours CEC signifie :


  - **Prendre conscience des transformations** environnementales et sociales.

  - **Se prépare**r et préparer son organisation à ces changements en **adaptant
  son modèle d’affaires et sa stratégie d’entreprise**.

  - **Construire sa feuille de route** à visée régénérative entre dirigeants
  d'entreprises.
description longue: >-
  Un parcours CEC est un accompagnement stratégique et collectif qui aide les
  dirigeants à comprendre les défis économiques, environnementaux et sociaux qui
  redessinent déjà leurs marchés. Il embarque des binômes de direction – un
  dirigeant et un “Planet Champion” – pour travailler avec d’autres dirigeants
  d’un même territoire, des experts de premier plan, des coachs et des
  facilitateurs. Ensemble, ils vont repenser leur modèle d’affaires à 10–15 ans.
illustration: images/TEE_energie_verte.webp
opérateur de contact: Convention des Entreprises pour le Climat
contact question: https://forms.monday.com/forms/3da64d3fb07da74aa4f161f1785608ac?r=use1
url: https://cec-impact.org/
nature de l'aide: étude
coût de l'accompagnement: Variable
durée de l'accompagnement: 12 jours d'accompagnement
objectifs:
  - description: >-
      Consultez le catalogue du CEC pour trouver le parcours correspondant à
      votre territoire et à votre secteur d’activité.
    liens:
      - lien: https://cec-impact.org/nos-parcours/
        texte: Catalogue des parcours
  - description: >-
      Cliquez sur le parcours qui vous intéresse et remplissez le formulaire de
      candidature de votre entreprise.
  - description: >-
      Vous êtes recontacté par un membre de la CEC pour échanger sur votre
      situation et finaliser l'inscription au parcours CEC.
conditions d'éligibilité:
  taille de l'entreprise:
    - Toutes tailles
    - Éligible aux micro-entreprises
  secteur géographique:
    - >-
      Auvergne-Rhône-Alpes, Bourgogne-Franche-Comté, Centre-Val de Loire, Grand
      Est, Hauts-de-France, Île-de-France
  secteur d'activité:
    - Tous secteurs d'activité
  nombre d'années d'activité:
    - Éligible à toutes les entreprises
