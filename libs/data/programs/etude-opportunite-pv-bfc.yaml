titre: Étude d'opportunité panneaux photovoltaïques
promesse: Estimez le potentiel de votre toiture pour un projet photovoltaïque
description: >-
  Faites-vous accompagner pour vérifier la pérennité d'un projets d'installation
  de panneaux photovoltaïques sur vos locaux professionnels.


  Ainsi vous vous assurez :


  - Du **potentiel de votre toiture** en fonction de l’ensoleillement, de
  l’orientation, de l’inclinaison et de la surface disponible.

  - De la **rentabilité du projet**.

  - Des **contraintes techniques**.
description longue: "Lors d'une visite sur site, le conseiller en transition énergétique et écologique étudie et vous remet un rapport de visite sur les points suivants :\n\n- Contrats et factures d’énergie actuels de votre entreprise.\n- Définition de votre\_profil de consommation d'électricité.\n- Étude d'implantation des panneaux avec identification des éventuelles contraintes techniques et/ou architecturales.\n- Simulation de votre production d'électricité.\n- Étude de rentabilité économique avec les options les plus pertinentes pour votre situation\_(autoconsommation, revente totale ou du surplus)."
illustration: images/TEE_eolienne.webp
opérateur de contact: Chambre des Métiers et de l'Artisanat
autres opérateurs:
  - CMA Bourgogne-Franche-Comté
contact question: formulaire
url: >-
  https://www.artisanat-bfc.fr/detail-offre/je-beneficie-dune-pre-etude-photovoltaique
nature de l'aide: étude
coût de l'accompagnement: De 350 à 700 € HT (en distanciel ou avec visite sur site)
durée de l'accompagnement: 1 journée
objectifs:
