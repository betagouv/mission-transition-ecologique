titre: Eval 360 Transition Ecologique
promesse: Faites un point complet sur tous les aspects de votre transition écologique
description: "Bénéficiez d'un accompagnement à l'état des lieux de votre entreprise en matière de transition écologique (mobilité, bâtiment, énergie, écoconception, décarbonation, eau, déchet, etc.).\\\nLe dispositif comporte deux étapes :​\n\n- Un **échange avec l'expert CCI** sur les thématiques prépondérantes de la transition écologique (actions mises en place, \_appétences, pressions).​\n- Un **rendez-vous de restitution** avec un livrable pour évoquer les pistes d'actions et opportunités à explorer."
début de validité: 01/01/2025
fin de validité: 31/12/2027
illustration: images/TEE_eolienne.webp
