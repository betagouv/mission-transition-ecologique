titre: Concilier enjeux écologiques et conditions de travail en TPE-PME
promesse: >-
  Articulez l’amélioration des conditions de travail avec des enjeux de
  transition écologique
description: "Faites-vous accompagner pour intégrer les enjeux écologiques dans les projets d’investissement, de réorganisation, de gestion des compétences ou de prévention des risques.\\\n\LSelon le degré de maturité de votre entreprise, il s'agira de :\n\n- **Sensibilisation** : conférences, retours d’expériences ou ateliers pour partager des repères sur le lien écologie-travail et ouvrir le dialogue professionnel/social.\n\n- **Formation** : analyse du travail réel dans les enjeux écologiques des projets de transformation dans l’entreprise.\n\n- **Études ou diagnostics thématiques** au sujet des effets de la transition écologique sur le travail et ses conditions de réalisation, suivies de recommandations."
description longue: >-
  L'accompagnement articule les trois volets d’actions suivants :


  - Volet « actions primaires » : anticiper et agir sur l’organisation du
  travail (charge, répartition des activités, rythmes, objectifs, coopérations,
  compétences, sens du travail) pour que les projets écologiques soient conduits
  en prenant en compte le travail réel.


  - Volet « actions secondaires » : aider les collectifs à faire face aux
  risques liés aux crises écologiques (événements climatiques extrêmes, tensions
  sur les ressources, crises sanitaires) et renforcer la résilience des
  organisations.


  - Volet « actions tertiaires » : développer les écogestes sans les isoler, en
  les reliant aux évolutions de l’organisation et à un accompagnement
  managérial.
