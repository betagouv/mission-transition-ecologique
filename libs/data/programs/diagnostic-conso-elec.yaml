titre: Diagnostic Conso Elec
promesse: Réduisez votre facture et votre consommation d'électricité
description: >-
  Réalisez une **analyse de votre consommation d’électricité** pour identifier
  les gaspillages et **optimiser vos contrats de fourniture**.


  Votre expert CMA collecte vos données de consommation sur le serveur d’ENEDIS.
  Suite à son analyse, il vous remet un rapport et un plan d'actions
  prioritaires au cours d'une restitution.
description longue: >-
  L'étude consiste à analyser votre courbe de charge d’électricité (puissances
  électriques appelées mesurées toutes les 10 minutes sur un historique de 2
  ans).


  Cela permet de : 


  - Quantifier le talon de consommation de l’entreprise (période de fermeture).

  - Analyser la consommation heure par heure sur une semaine type (hiver et
  été).

  - Déceler une consommation anormale.

  - Optimiser les contrats de fourniture (puissance souscrite, option heures
  creuses…).

  - De réduire la consommation et la facture d’électricité.
début de validité: 01/09/2024
fin de validité: 30/06/2028
