titre: Conseil mobilité
promesse: Bénéficiez des aides à l’acquisition de véhicules propres
description: "Vous prévoyez d’acheter un véhicule propre\_? Avant d’engager des frais, demandez conseil à un expert de la CMA Île-de-France pour vous aiguiller et vous aider à déterminer\_:\n\n- **La motorisation adaptée** à vos besoins (hydrogène, hybride, électrique, …).\n- **Le type de changement** (neuf, occasion, rétrofit).\n- **Les aides correspondantes** sur votre territoire."
illustration: images/TEE_eolienne.webp
opérateur de contact: Chambre des Métiers et de l'Artisanat
autres opérateurs:
  - CMA Île-de-France
contact question: formulaire
url: >-
  https://www.cma-idf.fr/services/reduire-mes-couts-de-carburant-en-faisant-le-point-avec-un-expert-en-mobilite-des
nature de l'aide: étude
coût de l'accompagnement: Jusqu'à 100% du coût de l'étude
durée de l'accompagnement: 1 jour
objectifs:
  - description: >-
      Contactez un conseiller via le formulaire dédié pour exprimer votre
      intérêt.
    liens:
      - formulaire: true
  - description: >-
      Un conseiller vous rappelle pour répondre à vos questions et vérifier
      votre éligibilité.
  - description: Lancez l'accompagnement avec l'expert proposé par votre CMA.
conditions d'éligibilité:
  taille de l'entreprise:
    - Moins de 250 salariés
    - Éligible aux micro-entreprises
  secteur géographique:
    - Île-de-France
  secteur d'activité:
    - Artisans
  nombre d'années d'activité:
    - Éligible à toutes les entreprises
publicodes:
  entreprise . est ciblée:
    toutes ces conditions:
      - est éligible
      - est dans un secteur d'activité ciblé
      - a un objectif ciblé
  entreprise . est éligible:
    toutes ces conditions:
      - a un effectif éligible
      - entreprise . est dans une zone géographique éligible
  entreprise . a un effectif éligible:
    toutes ces conditions:
      - effectif <= 249
  entreprise . est dans un secteur d'activité ciblé:
    une de ces conditions:
      - code NAF niveau 1 . est A
      - code NAF niveau 1 . est B
      - code NAF niveau 1 . est C
      - code NAF niveau 1 . est D
      - code NAF niveau 1 . est E
      - code NAF niveau 1 . est F
      - code NAF niveau 1 . est G
      - code NAF niveau 1 . est H
      - code NAF niveau 1 . est I
      - code NAF niveau 1 . est J
      - code NAF niveau 1 . est K
      - code NAF niveau 1 . est L
      - code NAF niveau 1 . est M
      - code NAF niveau 1 . est N
      - code NAF niveau 1 . est O
      - code NAF niveau 1 . est P
      - code NAF niveau 1 . est Q
      - code NAF niveau 1 . est R
      - code NAF niveau 1 . est S
      - code NAF niveau 1 . est T
      - code NAF niveau 1 . est U
  entreprise . a un objectif ciblé:
    une de ces conditions:
      - questionnaire . objectif prioritaire . est la mobilité durable
  entreprise . est dans une zone géographique éligible:
    une de ces conditions:
      - région = Île-de-France
