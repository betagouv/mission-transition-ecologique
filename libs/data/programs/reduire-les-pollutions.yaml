titre: Réduction des pollutions de l'eau
promesse: Contribuez à réduire les pollutions industrielles des milieux aquatiques
description: >-
  Faites-vous accompagner pour réduire les macro et les micropollutions issues
  des activités industrielles et artisanale. Ce dispositif finance, par exemple
  les études et les investissements concernant :


  - Les **aménagements internes et la réutilisation des eaux** qui visent à
  réduire ou supprimer les pollutions à la source.

  - Le **traitement des effluents**.

  - La construction d’**ouvrages de sécurité et de bassins de confinement**,
  afin de limiter les pollutions accidentelles et les rejets pluviaux.

  - Le **développement de partenariats**.
description longue: >-
  Les projets devront notamment :


  - S’inscrire dans un programme global de dépollution comprenant une réflexion
  en termes d’économie d’eau à l’échelle de l’établissement en identifiant les
  actions réalisables et les réductions déjà effectives en intégrant la
  trajectoire prospective d’adaptation au changement climatique.

  - Être portés par une structure créée depuis plus de 2 ans (sauf s’il y a
  continuité d’activité).

  - Aboutir à une réduction de la pression du rejet sur la masse d’eau et
  vérifier que le rejet projeté est compatible avec l’objectif d’état de la
  masse d’eau réceptrice ou avec les usages sensibles.

  - Pour les établissements générant des pollutions ponctuelles (rejet au milieu
  naturel), s’inscrire dans un projet individuel visant à respecter ou à aller
  au-delà de la réglementation ou s’intégrer dans une opération collective
  partenariale.

  - Pour les opérations concernant le traitement des micro-polluants, les études
  pilotes et leurs résultats permettant d’évaluer les filières de traitement,
  doivent être validés par un tiers expert indépendant et les traitements
  doivent être issus d’études pilotes.


  Ne sont pas éligibles aux aides de l’Agence les projets concernant :


  - Des pollutions nouvelles (exemple : création d’une entreprise).

  - Des travaux de renouvellement à l’identique des sites et sols pollués (site
  orphelin, fermé ou en post-exploitation).

  - Des activités de prestation de service (transport et/ou traitement
  d’effluents de tiers).

  - Des études réglementaires.
