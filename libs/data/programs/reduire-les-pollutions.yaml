objectifs:
  - description: Consultez la documentation pour vérifier l'éligibilité de votre projet.
    liens:
      - lien: >-
          https://eau-grandsudouest.com/sites/default/files/2025-11/fiche-thematique_industries_reduction-des-pollutions_hd_bureau.pdf
        texte: Conditions éligibilité et financement
  - description: Créez un compte sur l'appli Rivage pour déposer votre demande d'aide.
    liens:
      - lien: https://rivage.eau-adour-garonne.fr/appli/
        texte: Appli Rivages
  - description: >-
      Connectez-vous et sélectionnez la thématique "Lutte contre les pressions
      des activités économiques hors agriculture (réduction des pollutions,
      économies d’eau et eaux pluviales)" et sélectionnez l'un des dispositifs
      Rivage correspondant à votre projet.
  - description: >-
      Déposez votre dossier : informations administratives, description du
      projet, détails techniques et financiers, etc. À ce stade, votre projet ne
      doit pas avoir commencé !
  - description: >-
      Si votre demande est acceptée, recevez un contrat de financement précisant
      le montant d’aide maximum, les conditions et les modalités de versement.
