titre: Ressourc'eau
promesse: Faites-vous accompagner pour réaliser des économies d'eau
description: >-
  Bénéficiez d'un accompagnement personnalisé pour vous aider à réduire votre
  consommation d'eau et gérer efficacement et durablement la ressource.\

  En 3 à 5 jours et avec l'appui d'un expert, vous effectuez :


  - Un **état des lieux** à travers le recueil de vos consommations.

  - Une analyse des données et un **plan des actions** à mener en priorité.

  - Une restitution via l'envoi d'un **rapport personnalisé** et d'un
  accompagnement pour la mise en place des actions.

  - Un **suivi des actions engagées**, 6 à 12 mois plus tard.
début de validité: 01/01/2022
fin de validité: 31/12/2027
illustration: images/TEE_energie_verte.webp
opérateur de contact: Chambre de Commerce et de l'Industrie
autres opérateurs:
  - CCI Pays de la Loire
contact question: >-
  https://www.paysdelaloire.cci.fr/accompagnement/contact?thematique=transition_ecologique&page=programme-ressourceau
url: >-
  https://www.paysdelaloire.cci.fr/nantes-saint-nazaire/entreprise/transition-ecologique/programme-ressourceau
nature de l'aide: étude
coût de l'accompagnement: Gratuite
durée de l'accompagnement: 3 à 5 jours
activable en autonomie: oui
objectifs:
  - description: >-
      Remplissez l'appel à candidature pour manifester votre intérêt ou
      contactez votre conseiller à l'adresse
      [ressourceau@paysdelaloire.cci.fr](mailto:ressourceau@paysdelaloire.cci.fr)
    liens:
      - lien: >-
          https://s1.sphinxonline.net/surveyserver/s/CCI-Nantes-StNazaire/Ressourc_Eau/questionnaire.htm
        texte: Appel à candidature 2026
  - description: >-
      Si vous êtes éligible, un conseiller vous recontacte pour définir le
      calendrier et les modalités d'intervention.
  - description: Démarrez l'accompagnement.
conditions d'éligibilité:
  taille de l'entreprise:
    - Toutes tailles
    - Éligible aux micro-entreprises
  secteur géographique:
    - Pays de la Loire
  secteur d'activité:
    - Tous secteurs d'activité
  nombre d'années d'activité:
    - Éligible à toutes les entreprises
  autres critères d'éligibilité:
    - >-
      Ce dispositif vise les entreprises basées en Pays de la Loire qui
      consomment entre 10 000 et 100 000 m3 d’eau par an.
publicodes:
