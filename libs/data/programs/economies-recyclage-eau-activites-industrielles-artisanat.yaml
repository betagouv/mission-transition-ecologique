titre: Économiser et recycler l'eau dans l'industrie et l'artisanat
promesse: Réduisez la consommation d'eau induite par votre activité
description: >-
  Bénéficiez d'un accompagnement pour mener un investissement ou une étude
  préalable visant à réduire la consommation d'eau. En effet, le secteur
  Adour-Garonne est un l'un des plus impacté par le déficit hydrique. \

  Ce dispositif accompagne notamment :


  - Les **démarches prospectives** avant travaux.

  - Les **mise en circuit fermé** du réseau d'eau.

  - Les travaux de collecte et de **recyclage des eaux pluviales**.

  - Les travaux d’**économies d’eau** dans l'industrie et l'artisanat.

  - Les travaux de **transfert de prélèvements** vers des **ressources moins
  sensibles**.
description longue: >-
  Les projets devront permettre une économie de prélèvement d’eau d’au moins 10
  % du volume total annuel moyen prélevé dès lors que celui-ci est supérieur à 5
  000 m3 ou une économie supérieure à 500 000 m3.


  Opérations non éligibles :


  - Les opérations d’entretien ou liées à du renouvellement d’équipements à
  l’identique.

  - Les études nécessaires à la constitution des dossiers réglementaires.

  - Les projets portés par une structure créée depuis moins de 2 ans (sauf s’il
  y a continuité d’activité).
illustration: images/TEE_ampoule.webp
opérateur de contact: Agence de l'Eau
autres opérateurs:
  - Agence de l'Eau Adour-Garonne
contact question: https://eau-grandsudouest.com/contact
url: >-
  https://eau-grandsudouest.com/aides-financieres/activites-industrielles-artisanat
nature de l'aide: financement
montant du financement: 30 à 80% de l'étude ou de l'investissement, selon projet
objectifs:
  - description: Consultez la documentation pour vérifier l'éligibilité de votre projet.
    liens:
      - lien: >-
          https://eau-grandsudouest.com/sites/default/files/2025-11/fiche-thematique_industries_eco-d-eau_hd_bureau.pdf
        texte: Conditions éligibilité et financement
  - description: Créez un compte sur l'appli Rivage pour déposer votre demande d'aide.
    liens:
      - lien: https://rivage.eau-adour-garonne.fr/appli/
        texte: Appli Rivages
  - description: >-
      Connectez-vous et sélectionnez la thématique "Lutte contre les pressions
      des activités économiques hors agriculture (réduction des pollutions,
      économies d’eau et eaux pluviales)" et sélectionnez l'un des dispositifs
      Rivage correspondant à votre projet.
  - description: >-
      Déposez votre dossier : informations administratives, description du
      projet, détails techniques et financiers, etc. À ce stade, votre projet ne
      doit pas avoir commencé !
  - description: >-
      Si votre demande est acceptée, recevez un contrat de financement précisant
      le montant d’aide maximum, les conditions et les modalités de versement.
conditions d'éligibilité:
  taille de l'entreprise:
    - Toutes tailles
    - Éligible aux micro-entreprises
  secteur géographique:
    - Landes, Nouvelle-Aquitaine, Occitanie
  secteur d'activité:
    - Activités industrielles et artisanales
  nombre d'années d'activité:
    - Éligible à toutes les entreprises
