titre: ORMAT Objectif Recyclage Matières
promesse: >-
  Financez vos projets qui favorisent le recyclage et la sobriété en matières
  premières
description: >-
  Faites vous accompagner pour vos études ou vos investissements qui favorisent
  **la sobriété en matières premières, la résilience et la décarbonation de
  l’industrie par le recyclage.** Ce dispositif accompagne notamment :


  - Le surtri et la préparation de déchets en vue de leur recyclage.

  - La production de matières premières de recyclage (MPR) et leur incorporation
  dans les produits.

  - La réaffectation, le remanufacturing et le reconditionnement de batterie.
description longue: >-
  Critères techniques et économiques pour mesurer l’impact positif des projets
  :\

  • Approvisionnement identifié ou sécurisé ; pour préparation/surtri et
  production de MPR, les déchets approvisionnés sont détournés de
  l’enfouissement et/ou incinération CSR.\

  • Débouché identifié ou sécurisé.\

  • Proximité des approvisionnements et des débouchés.\

  • Recyclabilité et/ou durabilité des produits où seront incorporés les MPR.\

  • Intensité de coût et d’aide par tonne de matière recyclée ou par teq CO2
  évitée.\

  • Performance (notamment environnementale) et fiabilité de la technologie.\

  • Incitativité de l’aide – autres aides notamment.\

  • Qualité de la MPR.\

  • Positionnement du projet par rapport aux filières de Responsabilité Elargie
  du Producteur (REPs) et à la réglementation.\

  • Prise en compte des enjeux propres à un site industriel en transition : HSE/
  sécurité industrielle, impact sur la biodiversité, adaptation au changement
  climatique.
début de validité: 24/04/2026
fin de validité: 31/12/2026
