titre: Gestion des déchets en Outre-mer et Corse
promesse: Financez vos études et investissements pour la gestion des déchets
description: "Ce dispositif finance, en Corse et dans les Outre-mer, les études et les investissements structurants qui visent à améliorer **le** **tri, la valorisation et le traitement des déchets**. \n\nIl peut s'agir par exemple de projets qui concernent :\n\n- La création ou la rénovation des déchèteries et de centres de tri.\n\n- La création de plateformes de compostage.\n\n- La création de centres de préparation des CSR\_(Combustibles Solides de Récupération).\n\n- La création d’installations de valorisation énergétique.\n\n- La création ou l’extension de site de stockage des déchets.\n\n- La résorption des dépôts sauvages."
description longue: >-
  - Taux maximum de 80% pour les études, plafonnés à 50 000 € pour les
  diagnostics et 100 000 € pour les études de faisabilité.

  - Taux d’aide variant de 10 à 75% pour les investissements, plafonnés selon
  les territoires, les bénéficiaires et les types investissements.\
    \
    Pour candidater :
  - Le projet ne doit pas être déjà commencé.

  - Il va au-delà des seules obligations règlementaires et ne décharge pas\
    les producteurs de déchets des obligations qui leur incombent.
  - Pas de renouvellement à l’identique sans amélioration notable.

  - Le projet doit présenter un intérêt territorial avéré.

  - Pour les produits soumis à une filière Responsabilité Elargie des
  Producteurs (REP), une coordination avec les éco-organismes est obligatoire.

  - L’ADEME pourra demander en amont la réalisation d’une étude de\
    faisabilité préalable à l’investissement.
début de validité: 01/01/2026
fin de validité: 31/12/2026
