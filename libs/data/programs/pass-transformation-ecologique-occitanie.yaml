titre: Pass tranformation écologique
promesse: Bénéficiez d'un soutien pour vos travaux d’amélioration écologique
description: >-
  La région Occitanie soutient financièrement vos travaux d’amélioration
  écologique qui concernent :\

  • La **production de chaleur ou de froid** renouvelable (géothermie, solaire
  thermique, biomasse, PAC).\

  • La **gestion de l’eau et des déchets** (réutilisation de l'eau de pluie et
  des eaux usées, compacteur, broyeur de végétaux, système de tri et de
  recyclage...).\

  • La **sobriété énergétique** (isolation thermique, management de l'énergie,
  étanchéité des réseaux...).\

  • L'**impact sur l'environnement** (végétalisation, des-imperméabilisation des
  sols, transports collectifs électrique gratuits pour les touristes...).
description longue: >-
  - Un seul Pass Transformation Écologique peut être délivré tous les 3 ans pour
  chaque entreprise.

  - Assiette éligible minimale de 10 000 €, dépenses dans les 12 mois :
  investissement en matériel neuf et/ou d’occasion garantis 6 mois minimum d’un
  montant unitaire de 1000€ minimum, AMO dans la limite de 50% des
  investissements.
illustration: images/TEE_ampoule.webp
opérateur de contact: Région Occitanie
autres opérateurs:
  - ADEME
contact question: mailto:secretariat_deet@laregion.fr
url: https://hubentreprendre.laregion.fr/financement/pass-transformation-ecologique
nature de l'aide: financement
montant du financement: 50% des dépenses éligibles dans la limite de 10 000 €
