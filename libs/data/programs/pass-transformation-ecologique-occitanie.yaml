conditions d'éligibilité:
  taille de l'entreprise:
    - Entre 1 et 19 salariés
    - Éligible aux micro-entreprises
  secteur géographique:
    - Occitanie
  secteur d'activité:
    - |-
      Sont concernés, les secteurs :\
      • Industriel.\
      • De services aux entreprises (BtoB).\
      • Artisanal.\
      • Touristique.\
      • Relevant du secteur agro-alimentaire.
  nombre d'années d'activité:
    - Au moins 1 an d'activité
  autres critères d'éligibilité:
    - >-
      Sont exclues les entreprises ayant comme activités principales les
      services financiers, les professions libérales, les banques, les
      assurances, les services aux particuliers, les sociétés de commerce et de
      détail (BtoC), les CUMA, les exploitations agricoles et toutes entreprises
      non éligible au regard du règlement De Minimis en vigueur.
    - >-
      Les associations sont éligibles si elles ont un agrément d’Entreprise
      d’Insertion (EI) ou d’Entreprise Adaptée (EA) ou si le compte de résultat
      fait apparaître au moins 50% de recettes issues de la vente de biens ou
      services
publicodes:
