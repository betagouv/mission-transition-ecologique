titre: Contrat Innovation
promesse: Faites-vous accompagner pour votre projets d'innovation
description: >-
  La région Occitanie accompagne les phases de développement des projets R&D au
  service des transformations écologiques et sociales. Ces projets doivent
  répondre à l'un des critères suivant :


  - Mener une **démarche d’innovation intégrant des enjeux d’économie
  circulaire,\
    d’éco-conception, d’adaptation au changement climatique, de protection de la\
    biodiversité**, de low-tech, etc. dans leurs produits, process et services.
  - Élaborer des **réponses innovantes aux besoins sociaux et environnementaux
  en\
    associant les acteurs concernés**, dans les domaines tels que l’énergie,\
    l’environnement, la santé, l’alimentation, la mobilité, l’habitat, les filières locales, etc
illustration: images/TEE_eolienne.webp
opérateur de contact: Région Occitanie
autres opérateurs:
  - ADEME
contact question: mailto:pda_sfi@laregion.fr
url: https://hubentreprendre.laregion.fr/financement/contrat-innovation
nature de l'aide: financement
montant du financement: 40 000 à 500 000 € selon projet et taille de l'entreprise
objectifs:
  - description: >-
      Consultez la documentation pour vérifier l’éligibilité de votre projet et
      les pièces justificatives à fournir.
    liens:
      - lien: >-
          https://api.hubentreprendre.laregion.fr/fichiers-dispositifs/da3c6f0e-fd72-433c-b033-df9b7e9d6b07
        texte: Conditions éligibilité
  - description: >-
      Créez un compte via le Hub Entreprendre Occitanie pour pouvoir déposer
      votre dossier.
    liens:
      - lien: >-
          https://auth.mon-entreprise.laregion.fr/auth/realms/gdi-entreprise/protocol/openid-connect/auth?client_id=gdi-entreprise&redirect_uri=https%3A%2F%2Fmon-entreprise.laregion.fr%2F%3Fservice%3Dhubentreprendre%26redirect_uri%3Dhttps%3A%2F%2Fhubentreprendre.laregion.fr&state=4793fe8c-efc4-417f-bcca-fe85da8d2310&response_mode=fragment&response_type=code&scope=openid&nonce=3ecad457-8b13-41bd-9d7a-e9a64936aede
        texte: Créer mon compte
  - description: >-
      Déposez votre dossier : informations administratives, description du
      projet, détails techniques et financiers, etc. À ce stade, votre projet ne
      doit pas avoir commencé !
    liens:
      - lien: https://hubentreprendre.laregion.fr/
        texte: Déposer mon dossier
  - description: >-
      Votre demande d'aide est examinée. Si elle est acceptée, recevez un
      contrat de financement précisant le montant d’aide maximum, les conditions
      et les modalités de versement.
conditions d'éligibilité:
  taille de l'entreprise:
    - Toutes tailles
    - Éligible aux micro-entreprises
  secteur géographique:
    - Occitanie
  secteur d'activité:
    - Tous secteurs d'activité
  nombre d'années d'activité:
    - Éligible à toutes les entreprises
  autres critères d'éligibilité:
    - >-
      L'entreprise doit avoir son siège ou un établissement sur le territoire
      Occitanie exerçant une activité de R&D. L’entreprise bénéficiaire devra
      réaliser le projet de R&D en Occitanie avec des équipes domiciliées sur le
      territoire régional (nonobstant le télétravail qui devra être réalisé en
      région).
publicodes:
